# --- ต้องมี 3 Worker services พร้อมกัน (ไม่ใช่รันคำสั่งเดียว) ---
# Render แต่ละ Worker = 1 process เดียว → dots, skeleton, report ต้องเป็น 3 services แยกกัน ทั้งหมดต้อง Live
# (อย่า Suspend ตัวใดตัวหนึ่ง ถ้าต้องการ dots/skeleton + PDF พร้อมกัน)
#
# --- Three workers = run IN PARALLEL (แยก service แต่ทำพร้อมกัน) ---
# One upload enqueues dots + skeleton + report with the SAME group_id under jobs/groups/<id>/.
# - Dots worker (configured manually on Render dashboard, NOT in this yaml — service name
#   ai-people-reader-worker, repo switched to rungnapalumi/ai-people-reader-v2): processes mode=dots only.
#   Required env vars on dashboard:
#     WORKER_HANDLES_MODES = "dots"
#     PROCESSING_STALE_MINUTES = "5"
#     PYTHON_VERSION = "3.11.9"
#     + AWS_BUCKET / AWS_REGION / AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (copy from video-worker).
#   Build/start commands identical to ai-people-reader-v2-video-worker (xvfb-run -a python src/worker.py).
# - Skeleton worker (this file: ai-people-reader-v2-video-worker): processes mode=skeleton only.
# - Report worker (this file: ai-people-reader-v2-report-worker): mode=report only.
# Each video worker filters jobs/pending/ via WORKER_HANDLES_MODES so they never claim or recover the
# other worker's processing/<id>.json (see _job_mode_handled_here() + recovery sweeps in src/worker.py).
# Both poll jobs/pending/ independently → heavy work runs concurrently. Keep ALL services Live.
# Same AWS_BUCKET (+ keys or IAM) on every service, or workers "see" an empty queue.
#
# MediaPipe needs a virtual framebuffer on headless Linux: xvfb-run + libgl1 in build/start (below).
#
# Skeleton worker: only processes mode=skeleton from the S3 pending queue.
# Run scale = 1 instance. Pair with the dots worker service so the two modes execute in parallel.
# History: this service used to handle BOTH dots+skeleton. We split them and assigned dots to the
# legacy ai-people-reader-worker service (after pointing it at this same v2 repo).
- type: worker
  name: ai-people-reader-v2-video-worker
  runtime: python
  region: singapore
  plan: starter
  buildCommand: |
    set -e
    apt-get update
    DEBIAN_FRONTEND=noninteractive apt-get install -y ffmpeg xvfb xauth libgl1 libglib2.0-0
    ffmpeg -version
    pip install --upgrade pip
    pip install "setuptools>=65.0.0" "wheel>=0.38.0"
    pip cache purge
    pip install --no-cache-dir -r worker_requirements.txt
  # Use src/worker.py so Render matches local fixes (pending scan, queue diagnostics). Root worker.py is a slimmer alternate.
  startCommand: xvfb-run -a python src/worker.py
  envVars:
    - key: PYTHON_VERSION
      value: 3.11.9
    # This service only handles mode=skeleton. The peer dots worker (ai-people-reader-worker,
    # configured manually on Render dashboard) handles mode=dots with WORKER_HANDLES_MODES=dots.
    - key: WORKER_HANDLES_MODES
      value: "skeleton"
    # Skeleton output is gated until dots.mp4 exists — keeps People Reader bundle email expecting
    # both videos in S3 before sending. Dots worker runs the heavier mediapipe pass.
    - key: SKELETON_WAIT_FOR_DOTS
      value: "true"
    - key: PROCESSING_STALE_MINUTES
      value: "5"

# Report worker: after code changes to src/report_core.py, use "Clear build cache & deploy"
# in Render Dashboard to ensure new code is used. Check logs for REPORT_CORE_VERSION in report_core.py
#
# Prefer **one** running instance (scale = 1): multiple replicas race on jobs/pending/*.json and you will
# see logs like "pending key gone" while jobs still complete on the instance that claimed first.
- type: worker
  name: ai-people-reader-v2-report-worker
  runtime: python
  region: singapore
  plan: starter
  buildCommand: |
    set -e
    apt-get update
    DEBIAN_FRONTEND=noninteractive apt-get install -y chromium libreoffice libreoffice-writer libreoffice-core-nogui fonts-noto-core fonts-noto-ui-core fonts-thai-tlwg xvfb xauth libgl1 libglib2.0-0
    chromium --version || chromium-browser --version
    echo "[build] LibreOffice paths:" && (command -v libreoffice; command -v soffice; ls -la /usr/lib/libreoffice/program/soffice 2>/dev/null || true)
    pip install --upgrade pip
    pip install "setuptools>=65.0.0" "wheel>=0.38.0"
    pip cache purge
    pip install --no-cache-dir -r worker_report_requirements.txt
  startCommand: sh -c 'export PATH="/usr/bin:/usr/local/bin:$PATH" && xvfb-run -a python src/report_worker.py'
  envVars:
    - key: PYTHON_VERSION
      value: 3.11.9
    # Matplotlib must never pick a GUI backend on headless workers (graphs / PDF pipeline).
    - key: MPLBACKEND
      value: Agg
    # Optional: absolute path to directory containing Header.png / Footer.png if not at repo root on disk.
    # - key: AI_PEOPLE_READER_ASSET_DIR
    #   value: /opt/render/project
    - key: ANALYSIS_MODE
      value: real
    - key: DOCX_THAI_FONT_FAMILY
      value: Garuda
    # Never fail the whole report job if Thai PDF image-capture step errors; use vector PDF fallback.
    - key: THAI_PDF_IMAGE_CAPTURE_STRICT
      value: "false"
    # Email PDFs when ready; do not wait for skeleton (LPA can override in env if needed).
    - key: DEFER_REPORT_EMAIL_UNTIL_SKELETON
      value: "false"
    # Testing: set to "true" so only People Reader jobs (people_reader_job=true) run; other reports fail fast.
    # - key: REPORT_WORKER_PEOPLE_READER_ONLY
    #   value: "true"
