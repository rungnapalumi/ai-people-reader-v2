# --- Two workers = run IN PARALLEL (แยก service แต่ทำพร้อมกัน) ---
# One upload enqueues e.g. skeleton + report with the SAME group_id under jobs/groups/<id>/.
# - Video worker: encodes dots/skeleton from input.mp4 (modes dots | skeleton only).
# - Report worker: analyzes the SAME input.mp4 for DOCX/PDF (mode report). It does NOT wait for
#   skeleton.mp4 to exist — only email sequencing cares about expect_skeleton.
# Both poll jobs/pending/ independently → heavy work runs concurrently. Keep BOTH services Live.
# Same AWS_BUCKET (+ keys or IAM) on every service, or one worker "sees" an empty queue.
#
# Dots/Skeleton worker: processes dots and skeleton video jobs from S3 queue
- type: worker
  name: ai-people-reader-v2-video-worker
  runtime: python
  region: singapore
  plan: starter
  buildCommand: |
    set -e
    apt-get update
    DEBIAN_FRONTEND=noninteractive apt-get install -y ffmpeg
    ffmpeg -version
    pip install --upgrade pip
    pip install "setuptools>=65.0.0" "wheel>=0.38.0"
    pip cache purge
    pip install --no-cache-dir -r worker_requirements.txt
  # Use src/worker.py so Render matches local fixes (pending scan, queue diagnostics). Root worker.py is a slimmer alternate.
  startCommand: python src/worker.py
  envVars:
    - key: PYTHON_VERSION
      value: 3.11.9

# Report worker: after code changes to src/report_core.py, use "Clear build cache & deploy"
# in Render Dashboard to ensure new code is used. Check logs for "report_core version: 2026-03-07-relaxed"
- type: worker
  name: ai-people-reader-v2-report-worker
  runtime: python
  region: singapore
  plan: starter
  buildCommand: |
    set -e
    apt-get update
    DEBIAN_FRONTEND=noninteractive apt-get install -y chromium libreoffice libreoffice-writer libreoffice-core-nogui fonts-noto-core fonts-noto-ui-core fonts-thai-tlwg
    chromium --version || chromium-browser --version
    echo "[build] LibreOffice paths:" && (command -v libreoffice; command -v soffice; ls -la /usr/lib/libreoffice/program/soffice 2>/dev/null || true)
    pip install --upgrade pip
    pip install "setuptools>=65.0.0" "wheel>=0.38.0"
    pip cache purge
    pip install --no-cache-dir -r worker_report_requirements.txt
  startCommand: sh -c 'export PATH="/usr/bin:/usr/local/bin:$PATH" && python src/report_worker.py'
  envVars:
    - key: PYTHON_VERSION
      value: 3.11.9
    - key: ANALYSIS_MODE
      value: real
    - key: DOCX_THAI_FONT_FAMILY
      value: Garuda
